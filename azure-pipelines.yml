trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  FLUTTER_VERSION: '3.24.0'

stages:
  - stage: Analyze
    displayName: 'Analyze & Test'
    jobs:
      - job: AnalyzeAndTest
        displayName: 'Analyze and Test'
        steps:
          - task: FlutterInstall@0
            inputs:
              channel: 'stable'
              version: 'custom'
              customVersion: $(FLUTTER_VERSION)
          
          - script: flutter pub get
            displayName: 'Get dependencies'
          
          - script: dart format --output=none --set-exit-if-changed .
            displayName: 'Format check'
          
          - script: flutter analyze
            displayName: 'Analyze code'
          
          - script: flutter test --coverage
            displayName: 'Run tests'
          
          - task: PublishCodeCoverageResults@1
            inputs:
              codeCoverageTool: 'Cobertura'
              summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage/lcov.info'

  - stage: BuildAndroid
    displayName: 'Build Android'
    dependsOn: Analyze
    jobs:
      - job: BuildAndroid
        displayName: 'Build Android APK & AAB'
        steps:
          - task: FlutterInstall@0
            inputs:
              channel: 'stable'
              version: 'custom'
              customVersion: $(FLUTTER_VERSION)
          
          - script: flutter pub get
            displayName: 'Get dependencies'
          
          - script: flutter build apk --release
            displayName: 'Build APK'
          
          - script: flutter build appbundle --release
            displayName: 'Build App Bundle'
          
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'build/app/outputs/flutter-apk/app-release.apk'
              ArtifactName: 'android-apk'
          
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'build/app/outputs/bundle/release/app-release.aab'
              ArtifactName: 'android-aab'

  - stage: BuildIOS
    displayName: 'Build iOS'
    dependsOn: Analyze
    pool:
      vmImage: 'macOS-latest'
    jobs:
      - job: BuildIOS
        displayName: 'Build iOS App'
        steps:
          - task: FlutterInstall@0
            inputs:
              channel: 'stable'
              version: 'custom'
              customVersion: $(FLUTTER_VERSION)
          
          - script: flutter pub get
            displayName: 'Get dependencies'
          
          - script: flutter build ios --release --no-codesign
            displayName: 'Build iOS'
          
          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'build/ios/iphoneos/'
              ArtifactName: 'ios-build'
